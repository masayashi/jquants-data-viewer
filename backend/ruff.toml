line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "UP", "B", "RUF"]
ignore = [
    "B008",   # FastAPI Depends() in function defaults
    "RUF002", # Japanese full-width parentheses in docstrings are intentional
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
